<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>HTML Form Google API Submission</title>
  </head>
  <body>
    <main class="container">
      <h1>Fill this form</h1>
      <form id="form">
        <label for="name">
          Name:
          <input type="text" name="name" id="name" required />
        </label>
        <label for="email">
          Email:
          <input type="text" name="email" id="email" required />
        </label>
        <label for="suggestedTimes">
          Suggested Times:
          <textarea name="suggestedTimes" id="suggestedTimes" rows="2"></textarea>
        </label>
        <label for="anythingElse">
          Anything else?:
          <textarea name="anythingElse" id="anythingElse" rows="4"></textarea>
        </label>
        <button type="submit" id="button">Submit</button>
      </form>
    </main>
    <script src="app.js"></script>
  </body>
</html>
