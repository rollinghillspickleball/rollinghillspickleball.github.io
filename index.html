<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Rolling Hills Pickleball</title>

  </head>
  <body>
    
      <div class="row">
        <div class="column left">
          <img src="pickleball-bat-and-ball-vector.jpg"/>
        </div>
        <div class="column right">
            <main class="container"></main>
          <h1>Rolling Hills Pickleball</h1>
            <form id="form">
              <label for="name">
              Name:
              <input type="text" name="name" id="name" required />
              </label>
              <label for="email">
              Email:
              <input type="text" name="email" id="email" required />
              </label>
              <label for="suggestedTimes">
              Suggested Times:
              <textarea name="suggestedTimes" id="suggestedTimes" rows="2"></textarea>
              </label>
              <label for="anythingElse">
              Anything else?
              <textarea name="anythingElse" id="anythingElse" rows="4"></textarea>
              </label>
              <button type="submit" id="button">Submit</button>
            </form>
        </div>
         </main>
      </div>
      
      
   
    <script src="app.js"></script>
  </body>
</html>
